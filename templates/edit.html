<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記録編集</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <main class="edit-page">
        <div class="container">
            <h1 class="page__title">記録編集</h1>

            <form class="form" action="/update/{{ record['id'] }}" method="post">
                <div class="form_group">
                    <label class="form__label">タイム</label>

                    <div class="time-wrap">

                        <input class="time-box" type="text" id="hour" inputmode="numeric" maxlength="2" placeholder="00"
                            value="{{ time_text.split(':')[0] }}">

                        <span class="time-colon">:</span>

                        <input class="time-box" type="text" id="minute" inputmode="numeric" maxlength="2"
                            placeholder="00" value="{{ time_text.split(':')[1] }}">

                        <span class="time-colon">:</span>

                        <input class="time-box" type="text" id="second" inputmode="numeric" maxlength="2"
                            placeholder="00" value="00">

                        <input type="hidden" id="time" name="time">

                    </div>
                </div>

                <div class="form_group">
                    <label class="form__label" for="time_of_day">時間帯</label>
                    <select class="form_select" id="time_of_day" name="time_of_day" required>
                        <option value="朝" {% if record["time_of_day"]=="朝" %}selected{% endif %}>朝</option>
                        <option value="昼" {% if record["time_of_day"]=="昼" %}selected{% endif %}>昼</option>
                        <option value="夕方" {% if record["time_of_day"]=="夕方" %}selected{% endif %}>夕方</option>
                        <option value="夜" {% if record["time_of_day"]=="夜" %}selected{% endif %}>夜</option>
                    </select>
                </div>

                <div class="form_group">
                    <label class="form__label" for="training_type">練習内容</label>
                    <select class="form_select" id="training_type" name="training_type">
                        <option value="ジョグ" {% if record["training_type"]=="ジョグ" %}selected{% endif %}>ジョグ</option>
                        <option value="ペース走" {% if record["training_type"]=="ペース走" %}selected{% endif %}>ペース走</option>
                        <option value="インターバル" {% if record["training_type"]=="インターバル" %}selected{% endif %}>インターバル
                        </option>
                        <option value="ロング走" {% if record["training_type"]=="ロング走" %}selected{% endif %}>ロング走</option>
                        <option value="レース" {% if record["training_type"]=="レース" %}selected{% endif %}>レース</option>
                        <option value="その他" {% if record["training_type"]=="その他" %}selected{% endif %}>その他</option>
                    </select>
                </div>

                <div class="form_group">
                    <label class="form__label" for="strength_type">補強項目</label>
                    <select class="form_select" id="strength_type" name="strength_type">
                        <option value="なし" {% if record["strength_type"]=="なし" %}selected{% endif %}>なし</option>
                        <option value="体幹" {% if record["strength_type"]=="体幹" %}selected{% endif %}>体幹</option>
                        <option value="筋トレ" {% if record["strength_type"]=="筋トレ" %}selected{% endif %}>筋トレ</option>
                        <option value="ストレッチ" {% if record["strength_type"]=="ストレッチ" %}selected{% endif %}>ストレッチ
                        </option>
                        <option value="その他" {% if record["strength_type"]=="その他" %}selected{% endif %}>その他</option>
                    </select>
                </div>

                <div class="form_group">
                    <label class="form__label" for="detail_note">記事事項</label>
                    <textarea class="form_input" id="detail_note" name="detail_note" rows="4"
                        maxlength="120">{{ record["detail_note"] }}</textarea>
                </div>

                <button class="button button--main" type="submit">更新する</button>
            </form>
            <a class="back-link" href="/logs">一覧に戻る</a>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>

</html>
